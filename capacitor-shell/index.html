<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <title>Order Manager</title>
  <style>
    :root {
      color-scheme: light;
      --brand: #d76228;
      --brand-dark: #b54d1a;
      --bg: #fff8f4;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #f1dfd7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family:
        Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(215, 98, 40, 0.12), transparent 35%),
        var(--bg);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(env(safe-area-inset-top) + 24px) 20px calc(env(safe-area-inset-bottom) + 24px);
    }

    .card {
      width: 100%;
      max-width: 360px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px 22px;
      box-shadow: 0 20px 60px rgba(31, 41, 55, 0.08);
      text-align: center;
    }

    .badge {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #e97a43, var(--brand));
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }

    .status {
      margin-top: 18px;
      min-height: 22px;
      font-size: 14px;
      color: var(--brand-dark);
    }

    .button {
      margin-top: 22px;
      border: 0;
      width: 100%;
      border-radius: 14px;
      padding: 14px 16px;
      background: var(--brand);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .button:disabled {
      opacity: 0.7;
      cursor: wait;
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">
      <div class="badge" aria-hidden="true">OM</div>
      <h1>Order Manager</h1>
      <p id="message">Connecting you to live orders.</p>
      <div id="status" class="status">Checking internet connection...</div>
      <button id="retryButton" class="button" type="button" hidden>
        Try again
      </button>
    </section>
  </main>

  <script>
    const appUrl = "https://order.goeasy.menu";
    const probeUrl = "https://order.goeasy.menu/favicon.ico";
    const messageEl = document.getElementById("message");
    const statusEl = document.getElementById("status");
    const retryButton = document.getElementById("retryButton");
    let isCheckingConnection = false;

    function showOfflineState() {
      messageEl.textContent =
        "You're offline. Connect to the internet to use Order Manager.";
      statusEl.textContent = "No internet connection";
      retryButton.hidden = false;
      retryButton.disabled = false;
    }

    function showConnectingState() {
      messageEl.textContent = "Connecting you to live orders.";
      statusEl.textContent = "Opening Order Manager...";
      retryButton.hidden = true;
    }

    async function canReachApp() {
      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), 4000);

      try {
        await fetch(`${probeUrl}?t=${Date.now()}`, {
          method: "GET",
          mode: "no-cors",
          cache: "no-store",
          signal: controller.signal,
        });
        return true;
      } catch {
        return false;
      } finally {
        window.clearTimeout(timeoutId);
      }
    }

    async function openApp() {
      if (isCheckingConnection) return;

      isCheckingConnection = true;
      retryButton.disabled = true;
      showConnectingState();

      const isReachable = await canReachApp();
      isCheckingConnection = false;

      if (!isReachable) {
        showOfflineState();
        return;
      }

      window.location.replace(appUrl);
    }

    retryButton.addEventListener("click", async () => {
      statusEl.textContent = "Retrying...";
      await openApp();
    });

    window.addEventListener("online", openApp);
    window.addEventListener("offline", showOfflineState);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") openApp();
    });

    openApp();
  </script>
</body>

</html>
